name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          # Build golangci-lint from source with the runner's Go (1.25) instead of
          # downloading the prebuilt v2.1.6 binary (built with go1.24, which refuses
          # to lint this go1.25.0 module). Mirrors the local toolchain.
          install-mode: goinstall
